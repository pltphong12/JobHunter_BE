spring:
  application:
    name: jobhunter

  # config database
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

  profiles:
    active: development
  devtools:
    restart:
      enabled: true

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE}

  data:
    web:
      pageable:
        one-indexed-parameters: ${SPRING_DATA_WEB_PAGEABLE_ONE_INDEXED_PARAMETERS}

  # config send mail
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# config jwt
jobhunter:
  jwt:
    base64-secret: ${JOBHUNTER_JWT_BASE64_SECRET}
    access-token-validity-in-seconds: ${JOBHUNTER_JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS}
    refresh-token-validity-in-seconds: ${JOBHUNTER_JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS}

  # config upload file
  upload-file:
    base-uri: ${JOBHUNTER_UPLOAD_FILE_BASE_URI}
